name: Streamlit Keepalive

on:
  schedule:
    # Streamlit Community Cloud sleeps after 12h of inactivity.
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping Streamlit app
        env:
          STREAMLIT_APP_URL: ${{ vars.STREAMLIT_APP_URL }}
        run: |
          APP_URL="${STREAMLIT_APP_URL:-https://zoswiai.streamlit.app}"
          echo "Pinging ${APP_URL}"

          STATUS_CODE="$(curl \
            --silent \
            --show-error \
            --location \
            --max-time 30 \
            --retry 3 \
            --retry-delay 5 \
            --retry-all-errors \
            --output /dev/null \
            --write-out "%{http_code}" \
            "${APP_URL}?keepalive=$(date +%s)")"

          echo "HTTP ${STATUS_CODE}"

          if [ "${STATUS_CODE}" -lt 200 ] || [ "${STATUS_CODE}" -ge 500 ]; then
            echo "Keepalive ping failed with HTTP ${STATUS_CODE}"
            exit 1
          fi
